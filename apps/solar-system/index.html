 Herschel crater spans a third of its diameter. Subtle wobbles hint at a geologically young ocean beneath the ice."},{id:"enceladus",name:"Enceladus",type:"Moon of Saturn",color:15265522,dispR:.11,radiusKm:252.1,mass:"1.08 × 10²⁰ kg",rotation:"32.9 hours (locked)",period:"1.37 days around Saturn",moons:"—",parent:"saturn",orbDays:1.37,dispOrb:4.25,realOrbAU:.00159,blurb:"Geysers at its south pole vent a salty subsurface ocean straight into space, feeding Saturn's E ring. One of the top targets in the search for life."},{id:"tethys",name:"Tethys",type:"Moon of Saturn",color:13158596,dispR:.12,radiusKm:531.1,mass:"6.17 × 10²⁰ kg",rotation:"45.3 hours (locked)",period:"1.89 days around Saturn",moons:"—",parent:"saturn",orbDays:1.888,dispOrb:4.5,realOrbAU:.00197,blurb:"Nearly pure water ice, scarred by the giant Odysseus crater and Ithaca Chasma — a canyon running three-quarters of the way around it."},{id:"dione",name:"Dione",type:"Moon of Saturn",color:12434098,dispR:.12,radiusKm:561.4,mass:"1.10 × 10²¹ kg",rotation:"2.74 days (locked)",period:"2.74 days around Saturn",moons:"—",parent:"saturn",orbDays:2.737,dispOrb:4.75,realOrbAU:.00252,blurb:"Its 'wispy terrain' turned out to be ice cliffs hundreds of meters tall. May harbor a thin internal ocean."},{id:"rhea",name:"Rhea",type:"Moon of Saturn",color:11578532,dispR:.14,radiusKm:763.8,mass:"2.31 × 10²¹ kg",rotation:"4.52 days (locked)",period:"4.52 days around Saturn",moons:"—",parent:"saturn",orbDays:4.518,dispOrb:5,realOrbAU:.00352,blurb:"Saturn's second-largest moon — an ancient, heavily cratered ball of ice and rock."},{id:"titan",name:"Titan",type:"Moon of Saturn",color:13214810,dispR:.2,radiusKm:2574.7,mass:"1.35 × 10²³ kg",rotation:"15.95 days (locked)",period:"15.95 days around Saturn",moons:"—",parent:"saturn",orbDays:15.945,dispOrb:5.5,realOrbAU:.00817,blurb:"The only moon with a thick atmosphere, plus rivers and seas of liquid methane. NASA's Dragonfly rotorcraft launches for it in 2028."},{id:"iapetus",name:"Iapetus",type:"Moon of Saturn",color:10129280,dispR:.13,radiusKm:734.5,mass:"1.81 × 10²¹ kg",rotation:"79.3 days (locked)",period:"79.3 days around Saturn",moons:"—",parent:"saturn",orbDays:79.32,dispOrb:6.3,realOrbAU:.0238,blurb:"Two-toned — one hemisphere coal-dark, the other bright ice — with a bizarre equatorial ridge of 13-km peaks wrapping nearly the whole moon."},{id:"chiron",name:"Chiron",type:"Centaur",color:10134696,dispR:.18,radiusKm:108,mass:"≈ 5 × 10¹⁸ kg",rotation:"5.9 hours",period:"50.4 years",moons:"—",small:!0,blurb:"The first Centaur discovered (1977), looping between Saturn and Uranus — half asteroid, half comet, with sporadic outbursts and possibly its own rings. Centaurs are on unstable orbits; in a few million years it'll be ejected or become a comet."},{id:"uranus",name:"Uranus",type:"Ice giant",color:10475736,dispR:1.1,radiusKm:25362,mass:"8.68 × 10²⁵ kg",rotation:"17.2 hours (retrograde)",period:"84 years",moons:"28 known",blurb:"Rolls around the Sun on its side — axial tilt of 98°, likely from an ancient collision. Each pole gets 42 years of continuous sunlight."},{id:"miranda",name:"Miranda",type:"Moon of Uranus",color:12106944,dispR:.1,radiusKm:235.8,mass:"6.6 × 10¹⁹ kg",rotation:"33.9 hours (locked)",period:"1.41 days around Uranus",moons:"—",parent:"uranus",orbDays:1.413,dispOrb:1.7,realOrbAU:865e-6,blurb:"A jumbled patchwork of mismatched terrains, home to Verona Rupes — a cliff up to 20 km tall, the highest known anywhere."},{id:"ariel",name:"Ariel",type:"Moon of Uranus",color:12896458,dispR:.12,radiusKm:578.9,mass:"1.25 × 10²¹ kg",rotation:"2.52 days (locked)",period:"2.52 days around Uranus",moons:"—",parent:"uranus",orbDays:2.52,dispOrb:2,realOrbAU:.00128,blurb:"The brightest Uranian moon, crossed by canyons and smooth plains that point to past internal activity."},{id:"umbriel",name:"Umbriel",type:"Moon of Uranus",color:8159364,dispR:.12,radiusKm:584.7,mass:"1.28 × 10²¹ kg",rotation:"4.14 days (locked)",period:"4.14 days around Uranus",moons:"—",parent:"uranus",orbDays:4.144,dispOrb:2.3,realOrbAU:.00178,blurb:"The darkest of Uranus's big moons — an ancient surface with one strange bright crater ring nicknamed the 'fluorescent cheerio.'"},{id:"titania",name:"Titania",type:"Moon of Uranus",color:11449012,dispR:.14,radiusKm:788.4,mass:"3.42 × 10²¹ kg",rotation:"8.71 days (locked)",period:"8.71 days around Uranus",moons:"—",parent:"uranus",orbDays:8.706,dispOrb:2.65,realOrbAU:.00291,blurb:"The largest moon of Uranus. Huge fault canyons suggest its interior expanded and cracked the crust long ago."},{id:"oberon",name:"Oberon",type:"Moon of Uranus",color:10001048,dispR:.13,radiusKm:761.4,mass:"3.08 × 10²¹ kg",rotation:"13.5 days (locked)",period:"13.5 days around Uranus",moons:"—",parent:"uranus",orbDays:13.463,dispOrb:3,realOrbAU:.0039,blurb:"Outermost of the major Uranian moons — old, dark, and heavily cratered, with an unidentified mountain ~11 km high."},{id:"pholus",name:"Pholus",type:"Centaur",color:10251090,dispR:.16,radiusKm:99,mass:"unknown",rotation:"9.98 hours",period:"92 years",moons:"—",small:!0,blurb:"One of the reddest objects in the solar system, likely coated in complex organic compounds. Its eccentric orbit crosses both Saturn's and Neptune's."},{id:"neptune",name:"Neptune",type:"Ice giant",color:4878292,dispR:1.05,radiusKm:24622,mass:"1.02 × 10²⁶ kg",rotation:"16.1 hours",period:"164.8 years",moons:"16 known",blurb:"Found by mathematics before telescopes — predicted from Uranus's orbital wobbles. Fastest winds in the system: 2,100 km/h."},{id:"triton",name:"Triton",type:"Moon of Neptune",color:14208964,dispR:.16,radiusKm:1353.4,mass:"2.14 × 10²² kg",rotation:"5.88 days (locked)",period:"5.88 days around Neptune (retrograde)",moons:"—",parent:"neptune",orbDays:5.877,dispOrb:1.8,realOrbAU:.00237,retro:!0,blurb:"Orbits backwards — almost certainly a captured Kuiper belt object. Nitrogen geysers erupt from its frozen surface; it's slowly spiraling in toward eventual destruction."},{id:"pluto",name:"Pluto",type:"Dwarf planet · Kuiper belt",color:13086100,dispR:.3,radiusKm:1188.3,mass:"1.31 × 10²² kg",rotation:"6.4 days (retrograde)",period:"248 years",moons:"5 (incl. Charon)",blurb:"New Horizons revealed nitrogen-ice glaciers and water-ice mountains in 2015. Its orbit is so eccentric it sometimes sits inside Neptune's."},{id:"charon",name:"Charon",type:"Moon of Pluto",color:11050386,dispR:.18,radiusKm:606,mass:"1.59 × 10²¹ kg",rotation:"6.39 days (locked)",period:"6.39 days around Pluto",moons:"—",parent:"pluto",orbDays:6.387,dispOrb:.7,realOrbAU:131e-6,blurb:"Half the diameter of Pluto itself — the pair orbit a point outside Pluto's surface, making them effectively a binary system. Its north pole is stained red by captured Pluto atmosphere."},{id:"haumea",name:"Haumea",type:"Dwarf planet · Kuiper belt",color:14210252,dispR:.28,radiusKm:816,mass:"4.0 × 10²¹ kg",rotation:"3.9 hours",period:"284 years",moons:"2",blurb:"Spins so fast it's stretched into an egg shape — one of the fastest rotators known — and has its own faint ring system."},{id:"makemake",name:"Makemake",type:"Dwarf planet · Kuiper belt",color:13212285,dispR:.28,radiusKm:715,mass:"3.1 × 10²¹ kg",rotation:"22.8 hours",period:"306 years",moons:"1",blurb:"Second-brightest Kuiper belt object after Pluto, surfaced in frozen methane and ethane. Named for the Rapa Nui creator deity."},{id:"eris",name:"Eris",type:"Dwarf planet · scattered disc",color:13815753,dispR:.3,radiusKm:1163,mass:"1.66 × 10²² kg",rotation:"25.9 hours",period:"559 years",moons:"1 (Dysnomia)",blurb:"More massive than Pluto — its 2005 discovery forced the 'dwarf planet' definition. Ranges from 38 to 97 AU on a wildly tilted orbit."},{id:"dysnomia",name:"Dysnomia",type:"Moon of Eris",color:9144194,dispR:.12,radiusKm:308,mass:"≈ 8 × 10¹⁹ kg",rotation:"15.8 days (likely locked)",period:"15.8 days around Eris",moons:"—",parent:"eris",orbDays:15.786,dispOrb:.65,realOrbAU:249e-6,blurb:"Eris's only known moon. Tracking its orbit is how astronomers weighed Eris — and discovered it out-masses Pluto."},{id:"halley",name:"Halley",type:"Comet · Halley-type",color:13623534,dispR:.15,radiusKm:5.5,mass:"2.2 × 10¹⁴ kg",rotation:"≈ 2.2 days (tumbling)",period:"≈ 76 years",moons:"—",blurb:"Recorded by astronomers since at least 240 BC — the comet that proved comets return. Its orbit is retrograde and steeply tilted; perihelion in Feb 1986 (met by a five-spacecraft armada), next return July 2061. Debris shed along its path rains down as the Orionid and Eta Aquariid meteor showers every year."},{id:"halebopp",name:"Hale-Bopp",type:"Comet · long-period",color:14214896,dispR:.17,radiusKm:30,mass:"≈ 10¹⁶–10¹⁷ kg (est.)",rotation:"11.35 hours",period:"≈ 2,500 years",moons:"—",blurb:"The Great Comet of 1997 — naked-eye visible for a record 18 months, powered by a nucleus ~60 km across that dwarfs Halley's. Its orbit stands almost perpendicular to the ecliptic: it plunges into the planetary plane from above, rounds the Sun, and exits the way it came. Jupiter trimmed its period from ~4,200 years to ~2,500 on the way in — next return around the year 4385."},{id:"sedna",name:"Sedna",type:"Detached object · inner Oort cloud?",color:12872266,dispR:.28,radiusKm:498,mass:"≈ 1 × 10²¹ kg (est.)",rotation:"10.3 hours",period:"≈ 11,400 years",moons:"0 known",blurb:"So distant that Neptune can't touch it — perihelion 76 AU (arriving 2076, the first since the last ice age), aphelion near 900 AU. Something else shaped this orbit: a passing star, the Sun's birth cluster, or an undiscovered planet. One of the reddest objects in the solar system."},{id:"vp113",name:"2012 VP113",type:"Detached object · sednoid",color:11569818,dispR:.22,radiusKm:225,mass:"unknown",rotation:"unknown",period:"≈ 4,300 years",moons:"—",blurb:"Its perihelion of 80 AU is even more detached than Sedna's. The clustered orbital alignments of the sednoids are the central evidence in the Planet Nine hypothesis — either something big is herding them, or we're being fooled by small-number statistics."},{id:"voyager1",name:"Voyager 1",type:"Spacecraft · interstellar",color:15265010,dispR:.22,radiusStr:"3.7 m antenna dish",radiusKm:0,mass:"825 kg",rotation:"3-axis stabilized",period:"escape trajectory · 17 km/s",moons:"—",spacecraft:!0,sinceYr:1990,blurb:"Launched September 1977. Crossed the heliopause into interstellar space on Aug 25, 2012 at 121.6 AU — the most distant human-made object, still sending data home on a few watts of fading RTG power. Carries the Golden Record. (Position modeled from 1990 onward.)"},{id:"voyager2",name:"Voyager 2",type:"Spacecraft · interstellar",color:15265010,dispR:.22,radiusStr:"3.7 m antenna dish",radiusKm:0,mass:"825 kg",rotation:"3-axis stabilized",period:"escape trajectory · 15.4 km/s",moons:"—",spacecraft:!0,sinceYr:1990,blurb:"Launched two weeks before Voyager 1 on the slower 'Grand Tour' path — still the only spacecraft to have visited Uranus and Neptune. Crossed the heliopause Nov 5, 2018 at 119 AU, heading south of the ecliptic. (Position modeled from 1990 onward.)"},{id:"newhorizons",name:"New Horizons",type:"Spacecraft · Kuiper belt",color:15265010,dispR:.22,radiusStr:"2.1 m antenna dish",radiusKm:0,mass:"478 kg",rotation:"spin-stabilized (cruise)",period:"escape trajectory · ~14 km/s",moons:"—",spacecraft:!0,sinceYr:2016,blurb:"The fastest spacecraft ever to leave Earth (2006). Flew past Pluto on July 14, 2015 — the mission behind the nitrogen glaciers and ice mountains in Pluto's entry — then Arrokoth in 2019, the most distant world ever explored. Still healthy, now crossing the Kuiper belt's outer edge. (Position modeled from 2016 onward.)"},{id:"kuiperbelt",name:"Kuiper Belt",type:"Trans-Neptunian disk",region:!0,viewR:800,dispR:.01,color:7241103,radiusKm:0,stats:[["EXTENT","~30 to 50 AU"],["STRUCTURE","Plutinos (2:3) · classical belt · scattered disc"],["POPULATION","100,000+ objects over 100 km"],["TOTAL MASS","~0.1 Earth masses"],["VISITED","New Horizons — Pluto 2015, Arrokoth 2019"]],blurb:"The frozen leftover disk that Neptune never let assemble into a planet. Its structure is a fossil record: the plutino cluster exists because Neptune migrated outward early on, plowing objects into resonance as it went — that's how we know the planets moved."},{id:"heliopause",name:"Heliopause",type:"Heliosphere boundary",region:!0,viewR:3200,dispR:.01,color:6724061,radiusKm:0,stats:[["DISTANCE","~120 AU (breathes with the solar cycle)"],["INNER NEIGHBOR","Termination shock · ~90 AU"],["FIRST CROSSED","Voyager 1 · Aug 25, 2012"],["CONFIRMED","Voyager 2 · Nov 5, 2018"],["TRUE SHAPE","Comet-like, not spherical"]],blurb:"The edge of the Sun's weather. Inside, the solar wind rules; beyond, interstellar plasma takes over — both Voyagers measured the plasma density jumping ~40-fold at the crossing. It's a boundary of particles, not gravity: the Sun's gravitational reach extends a thousand times farther."},{id:"oortcloud",name:"Oort Cloud",type:"Comet reservoir",region:!0,viewR:55e3,dispR:.01,color:8031136,radiusKm:0,stats:[["EXTENT","~2,000 to ~100,000 AU"],["SHAPE","Spherical shell (inner region may be a torus)"],["POPULATION","Est. trillions of icy bodies"],["TOTAL MASS","Roughly a few Earth masses"],["STATUS","Never directly observed — inferred from comet orbits"]],blurb:"The Sun's deep freezer: debris the giant planets ejected during formation, pinned in a vast halo by galactic tides. Long-period comets are Oort objects knocked sunward by passing stars. Its outer edge reaches nearly a light-year — almost halfway to Alpha Centauri, whose own cloud may brush ours. Only the inner region (to ~5,000 AU) is rendered here; the rest lies 20× farther out."}],mA=["sun","mercury","venus","earth","moon","apophis","bennu","mars","phobos","deimos","eros","ceres","vesta","pallas","hygiea","jupiter","io","europa","ganymede","callisto","saturn","mimas","enceladus","tethys","dione","rhea","titan","iapetus","chiron","uranus","miranda","ariel","umbriel","t apetus:"Jápeto",chiron:"Quirón",uranus:"Urano",miranda:"Miranda",ariel:"Ariel",umbriel:"Umbriel",titania:"Titania",oberon:"Oberón",pholus:"Folo",neptune:"Neptuno",triton:"Tritón",pluto:"Plutón",charon:"Caronte",haumea:"Haumea",makemake:"Makemake",eris:"Eris",dysnomia:"Disnomia",halley:"Halley",halebopp:"Hale-Bopp",sedna:"Sedna",vp113:"2012 VP113",voyager1:"Voyager 1",voyager2:"Voyager 2",newhorizons:"New Horizons",kuiperbelt:"Cinturón de Kuiper",heliopause:"Heliopausa",oortcloud:"Nube de Oort"},types:{"G-type main-sequence star":"Estrella de secuencia principal tipo G","Terrestrial planet":"Planeta terrestre","Natural satellite of Earth":"Satélite natural de la Tierra","Moon of Mars":"Luna de Marte","Moon of Jupiter":"Luna de Júpiter","Moon of Saturn":"Luna de Saturno","Moon of Uranus":"Luna de Urano","Moon of Neptune":"Luna de Neptuno","Moon of Pluto":"Luna de Plutón","Moon of Eris":"Luna de Eris","Dwarf planet · asteroid belt":"Planeta enano · cinturón de asteroides","Gas giant":"Gigante gaseoso","Ice giant":"Gigante de hielo","Dwarf planet · Kuiper belt":"Planeta enano · cinturón de Kuiper","Dwarf planet · scattered disc":"Planeta enano · disco disperso","Asteroid · main belt":"Asteroide · cinturón principal","Near-Earth asteroid (Aten)":"Asteroide cercano a la Tierra (Atón)","Near-Earth asteroid (Apollo)":"Asteroide cercano a la Tierra (Apolo)","Near-Earth asteroid (Amor)":"Asteroide cercano a la Tierra (Amor)",Centaur:"Centauro","Comet · Halley-type":"Cometa · tipo Halley","Comet · long-period":"Cometa · de periodo largo","Detached object · inner Oort cloud?":"Objeto separado · ¿nube de Oort interior?","Detached object · sednoid":"Objeto separado · sednoide","Spacecraft · interstellar":"Nave espacial · interestelar","Spacecraft · Kuiper belt":"Nave espacial · cinturón de Kuiper","Trans-Neptunian disk":"Disco transneptuniano","Heliosphere boundary":"Frontera de la heliosfera","Comet reservoir":"Reserva de cometas"},stats:{kuiperbelt:[["EXTENSIÓN","~30 a 50 UA"],["ESTRUCTURA","Plutinos (2:3) · cinturón clásico · disco disperso"],["POBLACIÓN","Más de 100.000 objetos de +100 km"],["MASA TOTAL","~0,1 masas terrestres"],["VISITADO","New Horizons — Plutón 2015, Arrokoth 2019"]],heliopause:[["DISTANCIA","~120 UA (varía con el ciclo solar)"],["VECINO INTERIOR","Choque de terminación · ~90 UA"],["PRIMER CRUCE","Voyager 1 · 25 ago 2012"],["CONFIRMADO","Voyager 2 · 5 nov 2018"],["FORMA REAL","De cometa, no esférica"]],oortcloud:[["EXTENSIÓN","~2.000 a ~100.000 UA"],["FORMA","Capa esférica (el interior quizá toroidal)"],["POBLACIÓN","Billones de cuerpos helados (est.)"],["MASA TOTAL","Unas pocas masas terrestres"],["ESTADO","Nunca observada directamente — inferida de las órbitas de los cometas"]]},blurbs:{sun:"Contiene el 99,86% de la masa del sistema solar. Su núcleo fusiona ~600 millones de toneladas de hidrógeno en helio cada segundo.",mercury:"El planeta más pequeño y de órbita más rápida. Su superficie oscila entre −173 °C y 427 °C: el mayor rango térmico del sistema.",venus:"El planeta más caliente (464 °C) por un invernadero desbocado de CO₂ bajo 92 atmósferas. Su día dura más que su año y gira al revés.",earth:"El único hogar confirmado de la vida. 71% océano, protegida por su campo magnético y estabilizada por una luna inusualmente grande.",moon:"Probablemente nació de un impacto del tamaño de Marte hace 4.500 millones de años. Se aleja de la Tierra 3,8 cm al año.",apophis:"El 13 de abril de 2029 pasará a ~32.000 km de la Tierra — más cerca que los satélites geoestacionarios, visible a simple vista. Impacto descartado durante al menos un siglo.",bennu:"OSIRIS-REx tomó aquí una muestra entregada a la Tierra en 2023: rica en carbono y minerales alterados por agua. Uno de los asteroides peligrosos mejor vigilados.",mars:"Hogar del monte Olimpo (21 km) y de Valles Marineris (4.000 km). Sus antiguos cauces y deltas delatan un pasado más húmedo.",phobos:"Rodea Marte tres veces al día, más cerca que ninguna otra luna de su planeta. Las mareas lo despedazarán en ~50 millones de años.",deimos:"Una roca irregular de 12 km, quizá un asteroide capturado. Desde Marte parece una estrella brillante y lenta.",eros:"El primer asteroide orbitado y con aterrizaje (NEAR Shoemaker, 2001). Un 'cacahuete' de 34 km que se acerca a la órbita terrestre.",ceres:"El mayor objeto del cinturón, con un tercio de su masa total. La sonda Dawn halló depósitos salinos que sugieren líquido subterráneo.",vesta:"Segundo cuerpo más masivo del cinturón. Un 6% de los meteoritos terrestres son fragmentos suyos del impacto Rheasilvia. Dawn la orbitó en 2011-12.",pallas:"Tercer asteroide más grande, en una órbita insólita inclinada 35°: sube y baja del plano del cinturón en cada vuelta.",hygiea:"Cuarto del cinturón: oscuro, carbonáceo y casi esférico — algunos defienden que merece ser planeta enano.",jupiter:"Más del doble de masa que el resto de planetas juntos. La Gran Mancha Roja es una tormenta mayor que la Tierra, activa desde hace siglos.",io:"El cuerpo más volcánico del sistema solar, amasado por las mareas de Júpiter. Cientos de volcanes activos.",europa:"Una corteza de hielo sobre un océano salado global con quizá el doble de agua que la Tierra. Objetivo clave en la búsqueda de vida; Europa Clipper llega en 2030.",ganymede:"La luna más grande del sistema — mayor que Mercurio — y la única con campo magnético propio.",callisto:"El cuerpo más craterizado que se conoce: una superficie de 4.000 millones de años casi intacta.",saturn:"Menos denso que el agua. Sus anillos abarcan 280.000 km pero promedian solo ~10 metros de grosor: casi todo hielo de agua.",mimas:"La luna 'Estrella de la Muerte': el cráter Herschel ocupa un tercio de su diámetro. Podría ocultar un océano joven bajo el hielo.",enceladus:"Géiseres en su polo sur lanzan al espacio un océano salado que alimenta el anillo E de Saturno. Objetivo astrobiológico de primer orden.",tethys:"Casi hielo puro de agua, con el enorme cráter Odiseo y el cañón Ithaca Chasma, que la rodea en tres cuartas partes.",dione:"Sus 'terrenos difusos' resultaron ser acantilados de hielo de cientos de metros. Quizá alberga un océano interno delgado.",rhea:"La segunda luna de Saturno: una bola antigua y craterizada de hielo y roca.",titan:"La única luna con atmósfera densa, además de ríos y mares de metano líquido. El dron Dragonfly de la NASA partirá hacia ella en 2028.",iapetus:"Bicolor — un hemisferio negro como el carbón y otro de hielo brillante — con una cresta ecuatorial de picos de 13 km.",chiron:"El primer centauro descubierto (1977), entre Saturno y Urano: mitad asteroide, mitad cometa, con estallidos y quizá anillos. Su órbita es inestable.",uranus:"Rueda de lado alrededor del Sol: 98° de inclinación, quizá por una colisión antigua. Cada polo recibe 42 años de luz continua.",miranda:"Un mosaico de terrenos dispares con Verona Rupes, un acantilado de ~20 km: el más alto conocido.",ariel:"La más brillante de las lunas de Urano, con cañones y señales de actividad interna pasada.",umbriel:"La más oscura de las grandes lunas de Urano: antigua y craterizada.",titania:"La mayor luna de Urano: sus cañones de falla sugieren un pasado activo.",oberon:"La más externa de las grandes lunas de Urano: vieja, oscura y craterizada.",pholus:"Uno de los objetos más rojos del sistema, quizá cubierto de compuestos orgánicos complejos. Cruza las órbitas de Saturno y Neptuno.",neptune:"Descubierto por las matemáticas antes que por telescopio, a partir de las perturbaciones de Urano. Vientos de 2.100 km/h: los más rápidos del sistema.",triton:"Orbita al revés: casi con seguridad un objeto capturado del cinturón de Kuiper. Géiseres de nitrógeno; condenado a espiralar hacia dentro y desintegrarse.",pluto:"New Horizons reveló en 2015 glaciares de nitrógeno y montañas de hielo de agua. Su órbita es tan excéntrica que a veces queda dentro de la de Neptuno.",charon:"La mitad del diámetro de Plutón: ambos giran en torno a un punto fuera de la superficie de Plutón — un sistema binario de facto.",haumea:"Gira tan rápido que se deformó en forma de huevo — uno de los rotadores más veloces — y tiene su propio anillo tenue.",makemake:"El segundo objeto más brillante del cinturón de Kuiper tras Plutón, cubierto de metano y etano congelados.",eris:"Más masiva que Plutón: su descubrimiento en 2005 forzó la definición de 'planeta enano'. Va de 38 a 97 UA en una órbita muy inclinada.",dysnomia:"La única luna conocida de Eris. Seguir su órbita permitió pesar a Eris — y descubrir que supera a Plutón.",halley:"Registrado desde al menos el 240 a.C.: el cometa que demostró que los cometas regresan. Perihelio en febrero de 1986; próxima visita en julio de 2061. Sus restos causan las Oriónidas y las Eta Acuáridas.",halebopp:"El Gran Cometa de 1997: visible a simple vista 18 meses gracias a un núcleo de ~60 km. Su órbita, casi perpendicular a la eclíptica, lo traerá de vuelta hacia el año 4385.",sedna:"Tan lejano que Neptuno no puede tocarlo: perihelio a 76 UA (llega en 2076), afelio cerca de 900 UA. Algo más moldeó su órbita: una estrella que pasó o un planeta sin descubrir.",vp113:"Su perihelio de 80 UA es aún más 'separado' que el de Sedna. La alineación de los sednoides es la pieza central de la hipótesis del Planeta Nueve.",voyager1:"Lanzada en septiembre de 1977. Cruzó la heliopausa el 25 de agosto de 2012 a 121,6 UA: el objeto humano más lejano, aún transmitiendo con vatios menguantes. Lleva el Disco de Oro. (Posición modelada desde 1990.)",voyager2:"Lanzada dos semanas antes que la Voyager 1; la única nave que ha visitado Urano y Neptuno. Cruzó la heliopausa el 5 de noviembre de 2018 a 119 UA. (Posición modelada desde 1990.)",newhorizons:"La nave más rápida en dejar la Tierra (2006). Sobrevoló Plutón el 14 de julio de 2015 y Arrokoth en 2019: el mundo más lejano jamás explorado. (Posición modelada desde 2016.)",kuiperbelt:"El disco de restos congelados que Neptuno nunca dejó ensamblarse en planeta. Su estructura resonante es la prueba fósil de que Neptuno migró hacia afuera.",heliopause:"El borde del 'clima' solar: dentro manda el viento solar; fuera, el plasma interestelar. Ambas Voyager midieron el cruce. Es una frontera de partículas, no de gravedad.",oortcloud:"El congelador del Sol: escombros expulsados por los gigantes y fijados por las mareas galácticas. Los cometas de periodo largo caen desde aquí. Su borde exterior roza un año luz. Solo se muestra la región interior (hasta ~5.000 UA)."},units:[["tidally locked","acoplada por marea"],["likely locked","prob. acoplada"],["locked","acoplada"],["retrograde","retrógrada"],["around Earth","alrededor de la Tierra"],["around Mars","alrededor de Marte"],["around Jupiter","alrededor de Júpiter"],["around Saturn","alrededor de Saturno"],["around Uranus","alrededor de Urano"],["around Neptune","alrededor de Neptuno"],["around Pluto","alrededor de Plutón"],["around Eris","alrededor de Eris"],["escape trajectory","trayectoria de escape"],["3-axis stabilized","estabilizada en 3 ejes"],["spin-stabilized (cruise)","estabilizada por giro"],["m antenna dish","m de antena"],["billion km","mil millones de km"],["million km","millones de km"],["reference","referencia"],["× Earth","× Tierra"],["equator","ecuador"],["unknown","desconocida"],["known","conocidas"],["days","días"],["day","día"],["hours","horas"],["years","años"],[" AU"," UA"]]}};Zm.fr={ui:{search:"RECHERCHER UN OBJET…",noMatch:"AUCUN RÉSULTAT",labelKey:"LÉGENDE",tapToggle:"TOUCHER POUR MASQUER / AFFICHER",hideAll:"TOUT MASQUER",showAll:"TOUT AFFICHER",subtitle:"ÉPHÉMÉRIDES · DISTANCES À L'ÉCHELLE · 1 UA = 10 U",orbits:"ORBITES",trails:"TRACES",axis:"AXE",helio:"HÉLIO",key:"LÉGENDE",trueSize:"TAILLE RÉELLE",today:"AUJOURD'HUI",play:"▶ LECTURE",pause:"❚❚ PAUSE",hint3d:"GLISSER POUR PIVOTER · DEUX DOIGTS POUR DÉPLACER",hint2d:"VUE 2D · GLISSER POUR DÉPLACER",hintCommon:"PINCER/MOLETTE POUR ZOOMER · TOUCHER UN CORPS POUR SÉLECTIONNER",hintWarn:" · ⚠ POSITIONS APPROXIMATIVES HORS 1800–2050",hintGrade:" · POSIT n of Pluto":"Lune de Pluton","Moon of Eris":"Lune d'Éris","Dwarf planet · asteroid belt":"Planète naine · ceinture d'astéroïdes","Gas giant":"Géante gazeuse","Ice giant":"Géante de glaces","Dwarf planet · Kuiper belt":"Planète naine · ceinture de Kuiper","Dwarf planet · scattered disc":"Planète naine · disque épars","Asteroid · main belt":"Astéroïde · ceinture principale","Near-Earth asteroid (Aten)":"Astéroïde géocroiseur (Aton)","Near-Earth asteroid (Apollo)":"Astéroïde géocroiseur (Apollon)","Near-Earth asteroid (Amor)":"Astéroïde géocroiseur (Amor)",Centaur:"Centaure","Comet · Halley-type":"Comète · type Halley","Comet · long-period":"Comète · à longue période","Detached object · inner Oort cloud?":"Objet détaché · nuage d'Oort interne ?","Detached object · sednoid":"Objet détaché · sednoïde","Spacecraft · interstellar":"Sonde spatiale · interstellaire","Spacecraft · Kuiper belt":"Sonde spatiale · ceinture de Kuiper","Trans-Neptunian disk":"Disque transneptunien","Heliosphere boundary":"Frontière de l'héliosphère","Comet reservoir":"Réservoir de comètes"},stats:{kuiperbelt:[["ÉTENDUE","~30 à 50 UA"],["STRUCTURE","Plutinos (2:3) · ceinture classique · disque épars"],["POPULATION","Plus de 100 000 objets de +100 km"],["MASSE TOTALE","~0,1 masse terrestre"],["VISITÉE","New Horizons — Pluton 2015, Arrokoth 2019"]],heliopause:[["DISTANCE","~120 UA (respire avec le cycle solaire)"],["VOISIN INTERNE","Choc terminal · ~90 UA"],["PREMIER PASSAGE","Voyager 1 · 25 août 2012"],["CONFIRMÉ","Voyager 2 · 5 nov 2018"],["FORME RÉELLE","En comète, pas sphérique"]],oortcloud:[["ÉTENDUE","~2 000 à ~100 000 UA"],["FORME","Coquille sphérique (intérieur peut-être torique)"],["POPULATION","Des billions de corps glacés (est.)"],["MASSE TOTALE","Quelques masses terrestres"],["STATUT","Jamais observé directement — déduit des orbites cométaires"]]},blurbs:{sun:"Contient 99,86 % de la masse du système solaire. Son cœur fusionne ~600 millions de tonnes d'hydrogène en hélium chaque seconde.",mercury:"La plus petite planète, à l'orbite la plus rapide. Sa surface passe de −173 °C à 427 °C : le plus grand écart thermique du système.",venus:"La planète la plus chaude (464 °C) : effet de serre emballé au CO₂ sous 92 atmosphères. Son jour dure plus que son année, et elle tourne à l'envers.",earth:"Le seul foyer confirmé de la vie. 71 % d'océans, protégée par son champ magnétique et stabilisée par une lune inhabituellement grande.",moon:"Née sans doute d'un impact de la taille de Mars il y a 4,5 milliards d'années. Elle s'éloigne de la Terre de 3,8 cm par an.",apophis:"Le 13 avril 2029, il passera à ~32 000 km de la Terre — plus près que les satellites géostationnaires, visible à l'œil nu. Impact exclu pour au moins un siècle.",bennu:"OSIRIS-REx y a prélevé un échantillon livré sur Terre en 2023 : riche en carbone et en minéraux altérés par l'eau. L'un des astéroïdes dangereux les plus surveillés.",mars:"Abrite le mont Olympe (21 km) et Valles Marineris (4 000 km). Ses anciens lits de rivières trahissent un passé plus humide.",phobos:"Fait le tour de Mars trois fois par jour, plus près de sa planète qu'aucune autre lune. Les marées le disloqueront dans ~50 millions d'années.",deimos:"Un rocher irrégulier de 12 km, sans doute un astéroïde capturé. Depuis Mars, il ressemble à une étoile brillante et lente.",eros:"Le premier astéroïde orbité puis touché (NEAR Shoemaker, 2001). Une 'cacahuète' de 34 km qui s'approche de l'orbite terrestre.",ceres:"Le plus gros objet de la ceinture — un tiers de sa masse totale. La sonde Dawn y a trouvé des dépôts salins suggérant du liquide souterrain.",vesta:"Deuxième corps le plus massif de la ceinture. Environ 6 % des météorites terrestres en proviennent, éjectées par l'impact Rheasilvia.",pallas:"Troisième astéroïde par la taille, sur une orbite étrange inclinée à 35° : il monte et plonge à travers le plan de la ceinture à chaque tour.",hygiea:"Quatrième de la ceinture : sombre, carboné, presque sphérique — certains y voient une planète naine.",jupiter:"Plus du double de la masse de toutes les autres planètes réunies. La Grande Tache rouge est une tempête plus large que la Terre, active depuis des siècles.",io:"Le corps le plus volcanique du système solaire, pétri par les marées de Jupiter. Des centaines de volcans actifs.",europa:"Une coquille de glace sur un océan salé global contenant peut-être deux fois l'eau de la Terre. Cible majeure de la recherche de vie ; Europa Clipper arrive en 2030.",ganymede:"La plus grande lune du système — plus grosse que Mercure — et la seule dotée de son propre champ magnétique.",callisto:"Le corps le plus cratérisé connu : une surface de 4 milliards d'années quasiment intacte.",saturn:"Moins dense que l'eau. Ses anneaux s'étendent sur 280 000 km mais n'ont en moyenne que ~10 mètres d'épaisseur — surtout de la glace d'eau.",mimas:"La lune 'Étoile de la Mort' : le cratère Herschel occupe un tiers de son diamètre. Un jeune océan pourrait se cacher sous la glace.",enceladus:"Des geysers au pôle sud projettent dans l'espace un océan salé qui alimente l'anneau E de Saturne. Cible astrobiologique de premier plan.",tethys:"Presque de la glace d'eau pure, avec l'immense cratère Odysseus et le canyon Ithaca Chasma qui en fait presque le tour.",dione:"Ses 'terrains striés' se sont révélés être des falaises de glace de centaines de mètres. Peut-être un mince océan interne.",rhea:"La deuxième lune de Saturne : une boule ancienne et cratérisée de glace et de roche.",titan:"La seule lune à l'atmosphère épaisse, avec des rivières et des mers de méthane liquide. Le drone Dragonfly de la NASA partira vers elle en 2028.",iapetus:"Bicolore — un hémisphère noir charbon, l'autre de glace brillante — avec une crête équatoriale de pics de 13 km.",chiron:"Le premier Centaure découvert (1977), entre Saturne et Uranus : mi-astéroïde, mi-comète, avec des sursauts et peut-être des anneaux. Orbite instable.",uranus:"Roule sur le côté autour du Soleil : 98° d'inclinaison, sans doute après une collision ancienne. Chaque pôle reçoit 42 ans de lumière continue.",miranda:"Un patchwork de terrains disparates avec Verona Rupes, une falaise de ~20 km — la plus haute connue.",ariel:"La plus brillante des lunes d'Uranus, marquée de canyons et de traces d'activité passée.",umbriel:"La plus sombre des grandes lunes d'Uranus : ancienne et cratérisée.",titania:"La plus grande lune d'Uranus : ses canyons de failles suggèrent un passé actif.",oberon:"La plus externe des grandes lunes d'Uranus : vieille, sombre et cratérisée.",pholus:"L'un des objets les plus rouges du système, sans doute couvert de composés organiques complexes. Il croise les orbites de Saturne et de Neptune.",neptune:"Découverte par le calcul avant le télescope, grâce aux perturbations d'Uranus. Vents de 2 100 km/h : les plus rapides du système.",triton:"Orbite à contresens : presque certainement un objet capturé de la ceinture de Kuiper. Geysers d'azote ; condamné à spiraler vers sa destruction.",pluto:"New Horizons a révélé en 2015 des glaciers d'azote et des montagnes de glace d'eau. Son orbite est si excentrique qu'elle passe parfois à l'intérieur de celle de Neptune.",charon:"La moitié du diamètre de Pluton : les deux tournent autour d'un point situé hors de la surface de Pluton — un vrai système binaire.",haumea:"Tourne si vite qu'elle s'est déformée en œuf — l'un des rotateurs les plus rapides — et possède son propre anneau ténu.",makemake:"Le deuxième objet le plus brillant de la ceinture de Kuiper après Pluton, couvert de méthane et d'éthane gelés.",eris:"Plus massive que Pluton : sa découverte en 2005 a imposé la définition de 'planète naine'. Elle va de 38 à 97 UA sur une orbite très inclinée.",dysnomia:"La seule lune connue d'Éris. Suivre son orbite a permis de peser Éris — et de découvrir qu'elle dépasse Pluton.",halley:"Observée depuis au moins 240 av. J.-C. : la comète qui a prouvé que les comètes reviennent. Périhélie en février 1986 ; prochain retour en juillet 2061. Ses débris causent les Orionides et les Êta Aquarides.",halebopp:"La Grande Comète de 1997 : visible à l'œil nu pendant 18 mois grâce à un noyau de ~60 km. Son orbite, presque perpendiculaire à l'écliptique, la ramènera vers l'an 4385.",sedna:"Si lointain que Neptune ne peut pas l'atteindre : périhélie à 76 UA (atteint en 2076), aphélie vers 900 UA. Autre chose a façonné cette orbite : une étoile de passage, ou une planète inconnue.",vp113:"Son périhélie de 80 UA est encore plus 'détaché' que celui de Sedna. L'alignement des sednoïdes est la pièce maîtresse de l'hypothèse de la Planète Neuf.",voyager1:"Lancée en septembre 1977. A franchi l'héliopause le 25 août 2012 à 121,6 UA : l'objet humain le plus lointain, émettant encore avec quelques watts. Elle porte le Disque d'or. (Position modélisée à partir de 1990.)",voyager2:"Lancée deux semaines avant Voyager 1 ; la seule sonde à avoir visité Uranus et Neptune. A franchi l'héliopause le 5 novembre 2018 à 119 UA. (Position modélisée à partir de 1990.)",newhorizons:"La sonde la plus rapide à quitter la Terre (2006). A survolé Pluton le 14 juillet 2015, puis Arrokoth en 2019 : le monde le plus lointain jamais exploré. (Position modélisée à partir de 2016.)",kuiperbelt:"Le disque de débris gelés que Neptune n'a jamais laissé s'assembler en planète. Sa structure résonante est la preuve fossile de la migration de Neptune vers l'extérieur.",heliopause:"La limite de la 'météo' solaire : dedans règne le vent solaire ; dehors, le plasma interstellaire. Les deux Voyager ont mesuré le passage. Une frontière de particules, pas de gravité.",oortcloud:"Le congélateur du Soleil : des débris éjectés par les géantes, figés par les marées galactiques. Les comètes à longue période en tombent. Son bord externe frôle une année-lumière. Seule la région interne (jusqu'à ~5 000 UA) est représentée."},units:[["tidally locked","verrouillée par marée"],["likely locked","prob. verrouillée"],["locked","verrouillée"],["retrograde","rétrograde"],["around E OSIRIS-REx coletou aqui uma amostra entregue à Terra em 2023: rica em carbono e minerais alterados por água. Um dos asteroides perigosos mais monitorados.",mars:"Lar do monte Olimpo (21 km) e do Valles Marineris (4.000 km). Leitos de rios antigos revelam um passado mais úmido.",phobos:"Circunda Marte três vezes por dia, mais perto do planeta que qualquer outra lua. As marés vão despedaçá-lo em ~50 milhões de anos.",deimos:"Uma rocha irregular de 12 km, talvez um asteroide capturado. De Marte, parece uma estrela brilhante e lenta.",eros:"O primeiro asteroide orbitado e pousado (NEAR Shoemaker, 2001). Um 'amendoim' de 34 km que se aproxima da órbita terrestre.",ceres:"O maior objeto do cinturão — um terço de toda a sua massa. A sonda Dawn encontrou depósitos salinos que sugerem líquido subterrâneo.",vesta:"Segundo corpo mais massivo do cinturão. Cerca de 6% dos meteoritos terrestres são fragmentos seus, ejetados pelo impacto Rheasilvia.",pallas:"Terceiro maior asteroide, numa órbita estranha inclinada 35°: sobe e mergulha através do plano do cinturão a cada volta.",hygiea:"Quarto do cinturão: escuro, carbonáceo e quase esférico — alguns defendem que é um planeta anão.",jupiter:"Mais que o dobro da massa de todos os outros planetas juntos. A Grande Mancha Vermelha é uma tempestade maior que a Terra, ativa há séculos.",io:"O corpo mais vulcânico do sistema solar, amassado pelas marés de Júpiter. Centenas de vulcões ativos.",europa:"Uma casca de gelo sobre um oceano salgado global com talvez o dobro da água da Terra. Alvo central na busca por vida; a Europa Clipper chega em 2030.",ganymede:"A maior lua do sistema — maior que Mercúrio — e a única com campo magnético próprio.",callisto:"O corpo mais craterizado conhecido: uma superfície de 4 bilhões de anos praticamente intacta.",saturn:"Menos denso que a água. Seus anéis abrangem 280.000 km, mas têm em média só ~10 metros de espessura — quase tudo gelo de água.",mimas:"A lua 'Estrela da Morte': a cratera Herschel ocupa um terço do seu diâmetro. Pode esconder um oceano jovem sob o gelo.",enceladus:"Gêiseres no polo sul lançam ao espaço um oceano salgado que alimenta o anel E de Saturno. Alvo astrobiológico de primeira ordem.",tethys:"Quase gelo de água puro, com a enorme cratera Odisseu e o cânion Ithaca Chasma, que a contorna em três quartos.",dione:"Seus 'terrenos difusos' revelaram-se penhascos de gelo com centenas de metros. Talvez tenha um oceano interno fino.",rhea:"A segunda maior lua de Saturno: uma bola antiga e craterizada de gelo e rocha.",titan:"A única lua com atmosfera densa, além de rios e mares de metano líquido. O drone Dragonfly da NASA parte para lá em 2028.",iapetus:"Bicolor — um hemisfério negro como carvão, o outro de gelo brilhante — com uma crista equatorial de picos de 13 km.",chiron:"O primeiro Centauro descoberto (1977), entre Saturno e Urano: meio asteroide, meio cometa, com erupções e talvez anéis. Órbita instável.",uranus:"Rola de lado ao redor do Sol: 98° de inclinação, provavelmente por uma colisão antiga. Cada polo recebe 42 anos de luz contínua.",miranda:"Um mosaico de terrenos díspares com Verona Rupes, um penhasco de ~20 km — o mais alto conhecido.",ariel:"A mais brilhante das luas de Urano, com cânions e sinais de atividade interna passada.",umbriel:"A mais escura das grandes luas de Urano: antiga e craterizada.",titania:"A maior lua de Urano: seus cânions de falha sugerem um passado ativo.",oberon:"A mais externa das grandes luas de Urano: velha, escura e craterizada.",pholus:"Um dos objetos mais vermelhos do sistema, talvez coberto de compostos orgânicos complexos. Cruza as órbitas de Saturno e Netuno.",neptune:"Descoberto pela matemática antes do telescópio, a partir das perturbações de Urano. Ventos de 2.100 km/h: os mais rápidos do sistema.",triton:"Orbita ao contrário: quase certamente um objeto capturado do cinturão de Kuiper. Gêiseres de nitrogênio; condenado a espiralar para dentro e se desfazer.",pluto:"A New Horizons revelou em 2015 geleiras de nitrogênio e montanhas de gelo de água. Sua órbita é tão excêntrica que às vezes fica dentro da de Netuno.",charon:"Metade do diâmetro de Plutão: os dois giram em torno de um ponto fora da superfície de Plutão — um sistema binário de fato.",haumea:"Gira tão rápido que se deformou em formato de ovo — um dos rotadores mais velozes — e tem seu próprio anel tênue.",makemake:"O segundo objeto mais brilhante do cinturão de Kuiper depois de Plutão, coberto de metano e etano congelados.",eris:"Mais massiva que Plutão: sua descoberta em 2005 forçou a definição de 'planeta anão'. Vai de 38 a 97 UA numa órbita muito inclinada.",dysnomia:"A única lua conhecida de Éris. Acompanhar sua órbita permitiu pesar Éris — e descobrir que supera Plutão.",halley:"Registrado desde pelo menos 240 a.C.: o cometa que provou que cometas retornam. Periélio em fevereiro de 1986; próximo retorno em julho de 2061. Seus detritos causam as Oriônidas e as Eta Aquáridas.",halebopp:"O Grande Cometa de 1997: visível a olho nu por 18 meses graças a um núcleo de ~60 km. Sua órbita, quase perpendicular à eclíptica, o trará de volta por volta do ano 4385.",sedna:"Tão distante que Netuno não consegue alcançá-lo: periélio a 76 UA (chega em 2076), afélio perto de 900 UA. Outra coisa moldou essa órbita: uma estrela que passou, ou um planeta desconhecido.",vp113:"Seu periélio de 80 UA é ainda mais 'destacado' que o de Sedna. O alinhamento dos sednoides é a peça central da hipótese do Planeta Nove.",voyager1:"Lançada em setembro de 1977. Cruzou a heliopausa em 25 de agosto de 2012 a 121,6 UA: o objeto humano mais distante, ainda transmitindo com poucos watts. Leva o Disco de Ouro. (Posição modelada a partir de 1990.)",voyager2:"Lançada duas semanas antes da Voyager 1; a única sonda a visitar Urano e Netuno. Cruzou a heliopausa em 5 de novembro de 2018 a 119 UA. (Posição modelada a partir de 1990.)",newhorizons:"A sonda mais rápida a deixar a Terra (2006). Sobrevoou Plutão em 14 de julho de 2015 e Arrokoth em 2019: o mundo mais distante já explorado. (Posição modelada a partir de 2016.)",kuiperbelt:"O disco de restos congelados que Netuno nunca deixou virar planeta. Sua estrutura ressonante é a prova fóssil de que Netuno migrou para fora.",heliopause:"A borda do 'clima' solar: dentro manda o vento solar; fora, o plasma interestelar. As duas Voyager mediram a travessia. Uma fronteira de partículas, não de gravidade.",oortcloud:"O congelador do Sol: detritos ejetados pelos gigantes e fixados pelas marés galácticas. Os cometas de longo período caem de lá. Sua borda externa quase alcança um ano-luz. Só a região interna (até ~5.000 UA) é mostrada."},units:[["tidally locked","travada por maré"],["likely locked","prov. travada"],["locked","travada"],["retrograde","retrógrada"],["around Earth","ao redor da Terra"],["around Mars","ao redor de Marte"],["around Jupiter","ao redor de Júpiter"],["around Saturn","ao redor de Saturno"],["around Uranus","ao redor de Urano"],["around Neptune","ao redor de Netuno"],["around Pluto","ao redor de Plutão"],["around Eris","ao redor de Éris"],["escape trajectory","trajetória de escape"],["3-axis stabilized","estabilizada em 3 eixos"],["spin-stabilized (cruise)","estabilizada por rotação"],["m antenna dish","m de antena"],["billion km","bilhões de km"],["million km","milhões de km"],["reference","referência"],["× Earth","× Terra"],["equator","equador"],["unknown","desconhecida"],["known","conhecidas"],["days","dias"],["day","dia"],["hours","horas"],["years","anos"],[" AU"," UA"]]};function F1(n){return n/864e5+24405875e-1}function gA(n,e){let t=n.a[0]+n.a[1]*e,i=n.e[0]+n.e[1]*e,r=(n.I[0]+n.I[1]*e)*Kn,s=n.L[0]+n.L[1]*e,o=n.w[0]+n.w[1]*e,a=n.O[0]+n.O[1]*e,l=(s-o)%360;l>180&&(l-=360),l<-180&&(l+=360),l*=Kn;let c=i<.8?l+i*Math.sin(l):Math.PI*(l>=0?1:-1);for(let w=0;w<40;w++)c-=(c-i*Math.sin(c)-l)/(1-i*Math.cos(c));let u=t*(Math.cos(c)-i),d=t*Math.sqrt(1-i*i)*Math.sin(c),h=(o-a)*Kn,m=a*Kn,g=Math.cos(m),y=Math.sin(m),x=Math.cos(r),p=Math.sin(r),f=
