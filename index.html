<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AllAppsJohnnie</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151d;
    --panel-2:#171b26;
    --line:#242a38;
    --text:#e7ecf3;
    --muted:#8a93a6;
    --accent:#00e5c7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(0,229,199,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(120,90,255,.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:48px 24px 80px;}
  header{margin-bottom:32px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .dot{width:14px;height:14px;border-radius:50%;background:var(--accent);
       box-shadow:0 0 16px 2px var(--accent);}
  h1{font-size:30px;margin:0;letter-spacing:-.5px;}
  .sub{color:var(--muted);margin:8px 0 0;font-size:15px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:28px 0 8px;}
  #search{
    flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);
    color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;
  }
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,199,.15);}
  .tags{display:flex;flex-wrap:wrap;gap:8px;}
  .tag{
    background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:7px 12px;border-radius:999px;font-size:13px;cursor:pointer;user-select:none;
    transition:.15s;
  }
  .tag:hover{color:var(--text);border-color:#3a4256;}
  .tag.active{background:var(--accent);color:#04231f;border-color:var(--accent);font-weight:600;}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px;margin-top:24px;
  }
  .card{
    position:relative;display:block;text-decoration:none;color:inherit;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:14px;padding:20px 20px 18px;
    overflow:hidden;transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--card-accent,var(--accent));
  }
  .card:hover{transform:translateY(-3px);border-color:var(--card-accent,var(--accent));
    box-shadow:0 10px 30px -12px var(--card-accent,var(--accent));}
  .card h3{margin:0 0 8px;font-size:18px;letter-spacing:-.3px;}
  .card p{margin:0 0 14px;color:var(--muted);font-size:14px;line-height:1.5;}
  .card .meta{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:11px;color:var(--muted);border:1px solid var(--line);
        padding:3px 8px;border-radius:999px;}
  .open{font-size:13px;color:var(--card-accent,var(--accent));font-weight:600;white-space:nowrap;}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;border:1px dashed var(--line);
         border-radius:14px;margin-top:24px;}
  .empty code{background:var(--panel);padding:2px 6px;border-radius:6px;color:var(--text);}
  footer{margin-top:48px;color:var(--muted);font-size:13px;text-align:center;}
  footer code{color:var(--text);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="dot"></span><h1>AllAppsJohnnie</h1></div>
      <p class="sub">Everything I build, in one place.</p>
      <div class="controls">
        <input id="search" type="text" placeholder="Search apps…" autocomplete="off" />
        <div class="tags" id="tags"></div>
      </div>
    </header>

    <main id="grid" class="grid"></main>
    <div id="empty" class="empty" style="display:none"></div>

    <footer>
      Add an app by editing <code>apps.js</code> — one block per app.
    </footer>
  </div>

  <script src="apps.js"></script>
  <script>
    const apps = (window.APPS || []).slice();
    const grid = document.getElementById('grid');
    const emptyEl = document.getElementById('empty');
    const searchEl = document.getElementById('search');
    const tagsEl = document.getElementById('tags');

    let activeTag = null;

    const allTags = [...new Set(apps.flatMap(a => a.tags || []))].sort();
    tagsEl.innerHTML = allTags.map(t => `<span class="tag" data-tag="${t}">${t}</span>`).join('');
    tagsEl.addEventListener('click', e => {
      const t = e.target.closest('.tag');
      if (!t) return;
      const tag = t.dataset.tag;
      activeTag = (activeTag === tag) ? null : tag;
      [...tagsEl.children].forEach(c => c.classList.toggle('active', c.dataset.tag === activeTag));
      render();
    });

    searchEl.addEventListener('input', render);

    function render(){
      const q = searchEl.value.trim().toLowerCase();
      const list = apps.filter(a => {
        const hay = (a.title + ' ' + (a.description||'') + ' ' + (a.tags||[]).join(' ')).toLowerCase();
        const matchQ = !q || hay.includes(q);
        const matchTag = !activeTag || (a.tags||[]).includes(activeTag);
        return matchQ && matchTag;
      });

      if (!apps.length){
        grid.innerHTML = '';
        emptyEl.style.display = 'block';
        emptyEl.innerHTML = 'No apps yet. Open <code>apps.js</code> and add your first one.';
        return;
      }
      if (!list.length){
        grid.innerHTML = '';
        emptyEl.style.display = 'block';
        emptyEl.innerHTML = 'Nothing matches that filter.';
        return;
      }
      emptyEl.style.display = 'none';
      grid.innerHTML = list.map(a => `
        <a class="card" href="${a.path}" style="--card-accent:${a.accent || 'var(--accent)'}">
          <h3>${a.title}</h3>
          <p>${a.description || ''}</p>
          <div class="meta">
            <div class="chips">${(a.tags||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div>
            <span class="open">Open →</span>
          </div>
        </a>
      `).join('');
    }

    render();
  </script>
</
